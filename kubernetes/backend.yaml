apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: wanderlust
  labels:
    app: backend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: piyushpatil44099/backend-wanderlust:v1

        ports:
        - containerPort: 8080

        env:
        - name: MONGODB_URI
          value: "mongodb://mongo-service:27017/wanderlust"

        - name: REDIS_URL
          value: "redis://redis-service:6379"

        - name: PORT
          value: "8080"

        - name: FRONTEND_URL
          value: "http://frontend-service:5173"

        - name: ACCESS_COOKIE_MAXAGE
          value: "120000"

        - name: ACCESS_TOKEN_EXPIRES_IN
          value: "120s"

        - name: REFRESH_COOKIE_MAXAGE
          value: "120000"

        - name: REFRESH_TOKEN_EXPIRES_IN
          value: "120s"

        - name: JWT_SECRET
          value: "70dd8b38486eee723ce2505f6db06f1ee503fde5eb06fc0"

        - name: NODE_ENV
          value: "Development"

---
apiVersion: v1
kind: Service

metadata:
  name: backend-service
  namespace: wanderlust

spec:
  type: NodePort

  selector:
    app: backend

  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 31100